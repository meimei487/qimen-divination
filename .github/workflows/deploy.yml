name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安裝依賴
        run: npm ci

      - name: 打包建置
        run: npm run build

      - name: 上傳 Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
